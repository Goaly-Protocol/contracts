name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  foundry:
    name: Foundry (fmt + build + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show forge version
        run: forge --version

      - name: Check formatting
        run: forge fmt --check

      - name: Build
        run: forge build --sizes

      - name: Test
        # Fork tests (test/fork/**) need a live Arbitrum RPC and are skipped in CI.
        run: forge test --no-match-path 'test/fork/**' -vvv
